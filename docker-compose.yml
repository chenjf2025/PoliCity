services:
  redis:
    image: redis:7-alpine
    container_name: cgdss-redis
    ports:
      - "6380:6379"
    networks:
      - cgdss-network
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cgdss-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      TZ: Asia/Shanghai
    networks:
      - cgdss-network
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cgdss-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - cgdss-network
    environment:
      TZ: Asia/Shanghai

networks:
  cgdss-network:
    driver: bridge