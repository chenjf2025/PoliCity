services:
  redis:
    image: redis:7-alpine
    container_name: cgdss-redis
    ports:
      - "6380:6379"
    networks:
      - cgdss-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cgdss-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nexteacher:nexteacher8018@192.168.71.127:5433/cgdss}
      REDIS_URL: ${REDIS_URL:-redis://192.168.71.127:6380/0}
      DIFY_API_URL: ${DIFY_API_URL:-http://192.168.71.101:8080/v1}
      DIFY_API_KEY: ${DIFY_API_KEY}
      DIFY_APP_ID: ${DIFY_APP_ID}
      DIFY_DATASET_ID: ${DIFY_DATASET_ID}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    networks:
      - cgdss-network
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cgdss-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - cgdss-network

networks:
  cgdss-network:
    driver: bridge
